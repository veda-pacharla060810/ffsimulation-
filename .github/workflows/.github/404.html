<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Finance Forward</title>
    <!--
      GitHub Pages has no server-side rewrites, so a hard refresh or direct
      link to a client-side route (e.g. /budget) would normally 404.
      This redirects the path into a query string that index.html unpacks
      back into the real URL. See: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var segmentCount = 1; // matches the /finance-forward/ base path segment
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + segmentCount).join("/") +
        "/?/" +
        l.pathname.slice(1).split("/").slice(segmentCount).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
